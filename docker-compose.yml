version: '3.8'
services:
  server:
    build:
      context: .
      dockerfile: ./apps/server/Dockerfile
    ports:
      - "8000:8080"
    environment:
      - DATABASE_URL=postgresql://postgres@db:5432/nexturbo
      - BASE_URL=http://localhost:8000
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: nexturbo
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"